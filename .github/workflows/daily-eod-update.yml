# .github/workflows/daily-eod-update.yml

name: Daily EOD Update

on:
  # Zeitplan: Montag-Freitag um 19:00 UTC (20:00/21:00 DE)
  schedule:
    - cron: '0 19 * * 1-5'

  # Manuell auslösbar für Tests
  workflow_dispatch:

jobs:
  update-eod-data:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger EOD Update
        run: |
          echo "Starting EOD update..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            "${{ secrets.APP_URL }}/api/cron/eod-update" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Response: $BODY"
          echo "HTTP Code: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: Update failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "EOD update completed successfully!"
